# Local stack for the multi-node invariant test: one Redis (shared state) and
# two stateless gateway replicas behind whatever LB you put in front (or just
# hit them round-robin). Both replicas share Redis => the global budget holds.
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"

  gateway1:
    build: .
    command: ["/gateway", "-config", "/config.yaml"]
    volumes:
      - ./config.yaml:/config.yaml:ro
    environment:
      - REDIS_ADDR=redis:6379
    ports:
      - "8081:8080"
    depends_on:
      - redis

  gateway2:
    build: .
    command: ["/gateway", "-config", "/config.yaml"]
    volumes:
      - ./config.yaml:/config.yaml:ro
    environment:
      - REDIS_ADDR=redis:6379
    ports:
      - "8082:8080"
    depends_on:
      - redis
